# fly.toml
app = "roblox-bot-system"  # Change to your desired app name

[build]
  dockerfile = "Dockerfile"  # We'll create this

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true   # Stops when idle (saves money)
  auto_start_machines = true  # Restarts on request
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
